<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro de Clientes - Cafetería Gambito</title>
</head>
<body>
  <header>
    <h1>Registro de Clientes</h1>
    <h2>Únete a nuestra comunidad</h2>
  </header>

  <nav>
    <ul>
      <li><a href="index.html">Inicio</a></li>
      <li><a href="productos.html">Productos</a></li>
      <li><a href="registro.html">Registro de Clientes</a></li>
      <li><a href="contacto.html">Contacto</a></li>
    </ul>
  </nav>

  <main>
    <section id="formulario">
      <h2>Formulario de Registro</h2>
      <form action="registro.html" method="post">
        <label for="nombre">Nombre completo:</label><br>
        <input type="text" id="nombre" name="nombre" required><br><br>

        <label for="correo">Correo electrónico:</label><br>
        <input type="email" id="correo" name="correo" required><br><br>

        <label for="edad">Edad:</label><br>
        <input type="number" id="edad" name="edad" min="12" max="100" required><br><br>

        <label for="password">Contraseña:</label><br>
        <input type="password" id="password" name="password" required><br><br>

        <input type="submit" value="Registrarse">
      </form>
    </section>
  </main>

  <footer>
    <p>© 2026 Cafetería Gambito</p>
  </footer>
</body>
</html>
